# PAS Premium Engine - Application Properties
# Java 21 / Spring Boot 3.x replacement for COBOL PREMBAT and UNDWRT programs

server.port=8081

# H2 in-memory database (for local dev and testing; production uses DB2 z/OS)
spring.datasource.url=jdbc:h2:mem:pasdb;DB_CLOSE_DELAY=-1;MODE=DB2
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Schema and data initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.root=WARN
logging.level.com.acme.insurance.pas=INFO
