# Test configuration - H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=DB2
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=ACMEINS
spring.jpa.show-sql=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.jms.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jms.artemis.ArtemisAutoConfiguration
management.health.jms.enabled=false

spring.batch.jdbc.initialize-schema=embedded
spring.batch.job.enabled=false

logging.level.root=WARN
logging.level.com.acme.insurance.pas=DEBUG
