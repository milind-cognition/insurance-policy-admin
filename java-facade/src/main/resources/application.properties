# PAS REST Facade - Application Properties
# ============================================
# Read-only facade over DB2 z/OS for policy data.
# Added 2022 by T. Nguyen.
#
# WARNING: This connects directly to the mainframe DB2 subsystem.
# Do NOT change these settings without DBA approval.

server.port=8080
server.context-path=/

# DB2 z/OS Connection
# Using IBM DB2 Type 4 JDBC driver (JCC)
spring.datasource.url=jdbc:db2://mainframe.acme.local:5023/DBPD:currentSchema=ACMEINS;
spring.datasource.username=${DB2_USERNAME:PASFACAD}
spring.datasource.password=${DB2_PASSWORD:changeme}
spring.datasource.driver-class-name=com.ibm.db2.jcc.DB2Driver

# Disable automatic schema/data initialization in production.
# The local and test profiles explicitly enable this for H2.
spring.datasource.initialize=false

# Connection pool settings (conservative for mainframe)
spring.datasource.tomcat.max-active=10
spring.datasource.tomcat.max-idle=5
spring.datasource.tomcat.min-idle=2
spring.datasource.tomcat.initial-size=2
spring.datasource.tomcat.max-wait=30000
spring.datasource.tomcat.validation-query=SELECT 1 FROM SYSIBM.SYSDUMMY1
spring.datasource.tomcat.test-on-borrow=true

# Actuator endpoints
management.security.enabled=false
management.context-path=/manage
endpoints.health.sensitive=false

# Logging
logging.level.root=WARN
logging.level.com.acme.insurance.pas=INFO
logging.level.org.springframework.jdbc=DEBUG
logging.file=logs/pas-facade.log
