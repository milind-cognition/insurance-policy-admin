# PAS REST Application - Production Configuration
# =================================================
# Full read/write application replacing COBOL/CICS programs.

server.port=8080

# DB2 z/OS Connection (production)
spring.datasource.url=jdbc:db2://mainframe.acme.local:5023/DBPD:currentSchema=ACMEINS;
spring.datasource.username=${DB2_USERNAME:PASFACAD}
spring.datasource.password=${DB2_PASSWORD:changeme}
spring.datasource.driver-class-name=com.ibm.db2.jcc.DB2Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=ACMEINS
spring.jpa.show-sql=false

# Disable schema/data script initialization in production
spring.sql.init.mode=never

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# JMS / IBM MQ (disabled by default; enable in production profile)
spring.jms.enabled=false
# spring.artemis.broker-url=tcp://mq.acme.local:1414
# spring.artemis.user=${MQ_USERNAME}
# spring.artemis.password=${MQ_PASSWORD}

# Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.acme.insurance.pas=INFO
