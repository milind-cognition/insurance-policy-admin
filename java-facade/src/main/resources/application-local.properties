# PAS REST Application - Local Development Profile
# Uses H2 in-memory database instead of DB2 on z/OS.
# Activate with: --spring.profiles.active=local

server.port=8080

# H2 in-memory database (replaces DB2 z/OS)
spring.datasource.url=jdbc:h2:mem:pasdb;DB_CLOSE_DELAY=-1;MODE=DB2
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=ACMEINS
spring.jpa.show-sql=true

# Schema and data initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# JMS disabled for local dev
spring.jms.enabled=false

# Spring Batch
spring.batch.jdbc.initialize-schema=embedded
spring.batch.job.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.acme.insurance.pas=DEBUG
logging.level.org.springframework.jdbc=DEBUG
