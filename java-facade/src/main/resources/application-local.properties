# PAS REST Facade - Local Development Profile
# Uses H2 in-memory database instead of DB2 on z/OS.
# Activate with: --spring.profiles.active=local

server.port=8080
server.context-path=/

# H2 in-memory database (replaces DB2 z/OS connection)
spring.datasource.url=jdbc:h2:mem:pasdb;DB_CLOSE_DELAY=-1;MODE=DB2
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.initialize=true

# Enable H2 web console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator endpoints
management.security.enabled=false
management.context-path=/manage
endpoints.health.sensitive=false

# Logging
logging.level.root=WARN
logging.level.com.acme.insurance.pas=DEBUG
logging.level.org.springframework.jdbc=DEBUG
